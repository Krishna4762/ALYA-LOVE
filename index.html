<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Alya Anime World | Futuristic Anime Gallery</title>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* optional for ultra-modern feel, text select still possible */
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1f;
      overflow-x: hidden;
      color: #f0f0ff;
      transition: background 0.3s, color 0.3s;
    }

    /* Light Mode */
    body.light {
      background: #eef2ff;
      color: #0a0a2a;
    }
    body.light .glass-card, body.light .glass-nav, body.light .glass-btn, body.light .control-btn, body.light .category-btn {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }
    body.light .hero-title {
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1e1e3a;
    }
    ::-webkit-scrollbar-thumb {
      background: #ff6ac4;
      border-radius: 10px;
    }

    /* Glassmorphism core */
    .glass-card, .glass-nav, .glass-btn, .control-btn, .category-btn {
      background: rgba(20, 20, 45, 0.45);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: all 0.25s ease;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      transition: opacity 1.2s ease-in-out;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(10,10,31,0.7) 100%);
      z-index: -1;
    }
    .hero-content {
      z-index: 10;
      padding: 1rem;
      animation: fadeUp 1s ease-out;
    }
    .hero-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.6rem, 10vw, 5.8rem);
      font-weight: 900;
      background: linear-gradient(135deg, #FFB7F2, #A0E9FF, #C084FC);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(192, 132, 252, 0.6);
      letter-spacing: 2px;
    }
    .hero-sub {
      font-size: 1.2rem;
      margin: 1rem 0 2rem;
      font-weight: 300;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
    }
    .cta-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 0.9rem 2.2rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.25s;
      color: white;
      backdrop-filter: blur(8px);
    }
    .cta-btn:hover {
      background: rgba(255, 106, 196, 0.7);
      border-color: #ff6ac4;
      transform: scale(1.02);
      box-shadow: 0 0 20px #ff6ac4;
    }

    /* Particles canvas */
    #particles-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* Main Gallery Section */
    .gallery-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Controls Row */
    .controls-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      align-items: center;
    }
    .category-btn, .control-btn {
      background: rgba(25, 25, 55, 0.65);
      border: none;
      padding: 0.7rem 1.6rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #f0f0ff;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(10px);
    }
    .category-btn i, .control-btn i {
      font-size: 1rem;
    }
    .category-btn.active, .control-btn:active {
      background: #ff6ac4cc;
      border-color: #ffb3e6;
      box-shadow: 0 0 15px #ff6ac4;
      color: white;
    }
    .control-btn:hover, .category-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 106, 196, 0.6);
    }

    /* Auto refresh toggle special */
    .auto-toggle {
      background: rgba(0, 255, 255, 0.15);
      gap: 8px;
    }
    .toggle-switch {
      width: 42px;
      height: 22px;
      background: #2c2c54;
      border-radius: 30px;
      display: inline-block;
      position: relative;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-switch.active {
      background: #ff6ac4;
    }
    .toggle-switch::after {
      content: "";
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 3px;
      transition: 0.2s;
    }
    .toggle-switch.active::after {
      left: 21px;
    }

    /* Gallery Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.8rem;
      margin-top: 1rem;
    }
    .gallery-card {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(20, 20, 45, 0.5);
      backdrop-filter: blur(6px);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      aspect-ratio: 3 / 4;
    }
    .gallery-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .gallery-card:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 35px rgba(255, 106, 196, 0.3), 0 0 0 2px rgba(255, 106, 196, 0.6);
      border-radius: 28px;
    }
    .gallery-card:hover img {
      transform: scale(1.05);
    }
    .card-fav {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 12;
      transition: 0.2s;
      border: 1px solid rgba(255,255,200,0.3);
    }
    .card-fav i {
      font-size: 1.3rem;
      color: #ffa6d9;
      transition: 0.1s;
    }
    .card-fav i.fas {
      color: #ff3b8c;
      text-shadow: 0 0 5px hotpink;
    }
    .card-fav:hover {
      transform: scale(1.1);
    }

    /* Load More, Refresh buttons */
    .load-more-area {
      display: flex;
      justify-content: center;
      margin-top: 3rem;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.3s;
    }
    .lightbox.active {
      visibility: visible;
      opacity: 1;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 28px;
      box-shadow: 0 0 30px #ff6ac4;
      animation: zoomFade 0.3s ease;
    }
    .close-lightbox {
      position: absolute;
      top: 30px;
      right: 40px;
      font-size: 2.5rem;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      width: 50px;
      text-align: center;
    }

    /* Favorites panel */
    .fav-panel {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .fav-title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      background: linear-gradient(120deg, #ffb3e6, #9ac8ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .fav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }
    .fav-item {
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }
    .fav-item img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
    }

    /* Music & Dark mode */
    .floating-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99;
      display: flex;
      gap: 12px;
    }
    .round-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.2s;
    }

    /* Loading shimmer */
    .skeleton {
      background: linear-gradient(90deg, #2a2a4a 25%, #3a3a6a 50%, #2a2a4a 75%);
      background-size: 200% 100%;
      animation: loading 1.2s infinite;
      border-radius: 24px;
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes zoomFade {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 700px) {
      .gallery-grid { gap: 1rem; }
      .controls-row { gap: 0.7rem; }
    }
  </style>
</head>
<body>

<div class="hero" id="heroSection">
  <img class="hero-bg" id="heroBg" alt="hero anime">
  <div class="hero-overlay"></div>
  <canvas id="particles-canvas"></canvas>
  <div class="hero-content">
    <h1 class="hero-title">Alya Anime World</h1>
    <p class="hero-sub">Where anime dreams come alive ✨</p>
    <button class="cta-btn" id="exploreBtn"><i class="fas fa-glasses"></i> Explore Gallery</button>
  </div>
</div>

<div class="gallery-container" id="gallerySection">
  <div class="controls-row">
    <button class="category-btn active" data-cat="waifu"><i class="fas fa-heart"></i> Waifu 💖</button>
    <button class="category-btn" data-cat="cute"><i class="fas fa-smile-wink"></i> Cute 🌸</button>
    <button class="category-btn" data-cat="anime"><i class="fas fa-star"></i> Anime ✨</button>
    <button class="control-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
    <button class="control-btn" id="loadMoreBtn"><i class="fas fa-plus-circle"></i> Load More</button>
    <div class="control-btn auto-toggle" id="autoToggleBtn">
      <i class="fas fa-clock"></i> Auto
      <div class="toggle-switch" id="autoSwitch"></div>
    </div>
  </div>

  <div class="gallery-grid" id="galleryGrid">
    <!-- dynamic cards -->
  </div>
  <div class="load-more-area" id="loadingIndicator" style="display: none;">🌀 Loading dreamscapes...</div>

  <!-- FAVORITES PREMIUM SECTION -->
  <div class="fav-panel" id="favSection">
    <div class="fav-title"><i class="fas fa-heart"></i> ❤️ My Treasure Box</div>
    <div class="fav-grid" id="favGrid"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="close-lightbox">&times;</span>
  <img id="lightboxImg" alt="preview">
</div>

<!-- floating controls -->
<div class="floating-controls">
  <div class="round-btn" id="musicBtn"><i class="fas fa-music"></i></div>
  <div class="round-btn" id="darkModeBtn"><i class="fas fa-moon"></i></div>
</div>

<audio id="bgMusic" loop src="https://cdn.pixabay.com/download/audio/2022/02/22/audio_dd3e3a3f1b.mp3?filename=anime-lofi-116191.mp3" preload="none"></audio>

<script>
  // ---------- GLOBALS ----------
  let currentCategory = "waifu";
  let currentImages = [];     // array of image urls
  let isLoading = false;
  let autoRefreshInterval = null;
  let autoRefreshActive = false;
  let favorites = new Set();   // store favorite image urls

  // DOM elements
  const galleryGrid = document.getElementById('galleryGrid');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const categoryBtns = document.querySelectorAll('.category-btn');
  const autoSwitch = document.getElementById('autoSwitch');
  const autoToggleBtn = document.getElementById('autoToggleBtn');
  const loadingIndicator = document.getElementById('loadingIndicator');
  const heroBg = document.getElementById('heroBg');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const closeLightbox = document.querySelector('.close-lightbox');
  const exploreBtn = document.getElementById('exploreBtn');
  const favGrid = document.getElementById('favGrid');
  const musicBtn = document.getElementById('musicBtn');
  const darkBtn = document.getElementById('darkModeBtn');
  const audio = document.getElementById('bgMusic');

  let musicPlaying = false;

  // Helper: Load favorites from localStorage
  function loadFavorites() {
    const stored = localStorage.getItem('alya_favs');
    if(stored) {
      favorites = new Set(JSON.parse(stored));
    }
    renderFavoritesGrid();
  }
  function saveFavorites() {
    localStorage.setItem('alya_favs', JSON.stringify([...favorites]));
    renderFavoritesGrid();
  }
  function toggleFavorite(url) {
    if(favorites.has(url)) favorites.delete(url);
    else favorites.add(url);
    saveFavorites();
    renderGalleryCards(); // re-render to update heart icons
  }

  // RENDER gallery cards from currentImages array
  function renderGalleryCards() {
    if(!galleryGrid) return;
    galleryGrid.innerHTML = '';
    if(currentImages.length === 0) {
      galleryGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">✨ No images yet, hit refresh ✨</div>';
      return;
    }
    currentImages.forEach((url, idx) => {
      const card = document.createElement('div');
      card.className = 'gallery-card';
      const img = document.createElement('img');
      img.src = url;
      img.alt = 'anime art';
      img.loading = 'lazy';
      const favBtn = document.createElement('div');
      favBtn.className = 'card-fav';
      const isFav = favorites.has(url);
      favBtn.innerHTML = `<i class="${isFav ? 'fas' : 'far'} fa-heart"></i>`;
      favBtn.onclick = (e) => {
        e.stopPropagation();
        toggleFavorite(url);
      };
      card.appendChild(img);
      card.appendChild(favBtn);
      card.onclick = () => openLightbox(url);
      galleryGrid.appendChild(card);
    });
  }

  function openLightbox(url) {
    lightboxImg.src = url;
    lightbox.classList.add('active');
  }
  function closeLightboxFn() { lightbox.classList.remove('active'); }

  // ----- API INTEGRATION (waifu.pics) -----
  async function fetchImagesByCategory(category, count = 20) {
    try {
      if(category === 'waifu') {
        const res = await fetch('https://api.waifu.pics/many/sfw/waifu', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
        const data = await res.json();
        return data.files.slice(0, count);
      } 
      else if(category === 'cute') {
        // using 'smile' category for cute vibe
        const res = await fetch('https://api.waifu.pics/many/sfw/smile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
        const data = await res.json();
        return data.files.slice(0, count);
      } 
      else if(category === 'anime') {
        // mix multiple categories to reflect "anime" world
        const cats = ['waifu', 'neko', 'shinobu', 'megumin', 'blush', 'happy'];
        const requests = cats.map(c => fetch('https://api.waifu.pics/many/sfw/'+c, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) }).then(r => r.json()).catch(() => ({files:[]})));
        const results = await Promise.all(requests);
        let combined = [];
        results.forEach(r => { if(r.files) combined.push(...r.files); });
        combined = [...new Set(combined)];
        // shuffle & slice
        for(let i=combined.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [combined[i],combined[j]]=[combined[j],combined[i]]; }
        return combined.slice(0, count);
      }
      return [];
    } catch(err) {
      console.warn(err);
      return [];
    }
  }

  // Load initial gallery for category
  async function loadGallery(reset = true, append = false) {
    if(isLoading) return;
    isLoading = true;
    if(!append) loadingIndicator.style.display = 'flex';
    const images = await fetchImagesByCategory(currentCategory, 20);
    if(images && images.length) {
      if(!append) currentImages = images;
      else currentImages.push(...images);
      renderGalleryCards();
    } else {
      if(!append && currentImages.length===0) renderGalleryCards();
    }
    isLoading = false;
    loadingIndicator.style.display = 'none';
  }

  async function refreshGallery() {
    if(autoRefreshActive) stopAutoRefresh();
    await loadGallery(false, false);
    if(autoRefreshActive) startAutoRefresh();
  }

  async function loadMore() {
    if(isLoading) return;
    isLoading = true;
    const moreImgs = await fetchImagesByCategory(currentCategory, 16);
    if(moreImgs && moreImgs.length) {
      currentImages.push(...moreImgs);
      renderGalleryCards();
    }
    isLoading = false;
  }

  // Auto refresh system
  function startAutoRefresh() {
    if(autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(async () => {
      if(!autoRefreshActive) return;
      await refreshGallery();
    }, 45000);
  }
  function stopAutoRefresh() {
    if(autoRefreshInterval) { clearInterval(autoRefreshInterval); autoRefreshInterval = null; }
  }
  function toggleAutoRefresh() {
    autoRefreshActive = !autoRefreshActive;
    if(autoRefreshActive) {
      startAutoRefresh();
      autoSwitch.classList.add('active');
    } else {
      stopAutoRefresh();
      autoSwitch.classList.remove('active');
    }
  }

  // category switching
  function setCategory(cat) {
    currentCategory = cat;
    if(autoRefreshActive) stopAutoRefresh();
    loadGallery(false, false).then(() => {
      if(autoRefreshActive) startAutoRefresh();
    });
    categoryBtns.forEach(btn => {
      if(btn.dataset.cat === cat) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  // render favorites grid
  function renderFavoritesGrid() {
    favGrid.innerHTML = '';
    if(favorites.size === 0) {
      favGrid.innerHTML = '<div style="grid-column:1/-1; opacity:0.7;">❤️ Click heart on any card to save here</div>';
      return;
    }
    const favArray = [...favorites];
    favArray.forEach(url => {
      const div = document.createElement('div');
      div.className = 'fav-item glass-card';
      const img = document.createElement('img');
      img.src = url;
      img.loading = 'lazy';
      div.appendChild(img);
      div.onclick = () => openLightbox(url);
      favGrid.appendChild(div);
    });
  }

  // HERO: rotating background images from API
  let heroImageUrls = [];
  let heroIndex = 0;
  async function fetchHeroBackgrounds() {
    try {
      const res = await fetch('https://api.waifu.pics/many/sfw/waifu', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
      const data = await res.json();
      heroImageUrls = data.files.slice(0, 8);
      if(heroImageUrls.length) heroBg.src = heroImageUrls[0];
      setInterval(() => {
        if(heroImageUrls.length) {
          heroIndex = (heroIndex+1) % heroImageUrls.length;
          heroBg.style.opacity = '0';
          setTimeout(() => {
            heroBg.src = heroImageUrls[heroIndex];
            heroBg.style.opacity = '1';
          }, 200);
        }
      }, 7000);
    } catch(e) { console.warn(e); }
  }
  fetchHeroBackgrounds();

  // Particle effect (lightweight)
  function initParticles() {
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth, height = window.innerHeight;
    let particles = [];
    const PARTICLE_COUNT = 60;
    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    for(let i=0;i<PARTICLE_COUNT;i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        radius: Math.random() * 2.5 + 1,
        alpha: Math.random() * 0.6 + 0.2,
        speedX: (Math.random() - 0.5) * 0.3,
        speedY: (Math.random() - 0.5) * 0.2,
      });
    }
    function animate() {
      if(!ctx) return;
      ctx.clearRect(0,0,width,height);
      for(let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255, 180, 240, ${p.alpha})`;
        ctx.fill();
        p.x += p.speedX;
        p.y += p.speedY;
        if(p.x < 0) p.x = width;
        if(p.x > width) p.x = 0;
        if(p.y < 0) p.y = height;
        if(p.y > height) p.y = 0;
      }
      requestAnimationFrame(animate);
    }
    animate();
  }
  initParticles();

  // Dark mode toggle
  function toggleDarkMode() {
    document.body.classList.toggle('light');
    const icon = darkBtn.querySelector('i');
    if(document.body.classList.contains('light')) icon.className = 'fas fa-sun';
    else icon.className = 'fas fa-moon';
  }
// Music Toggle
  function toggleMusic() {
    if(musicPlaying) {
      audio.pause();
      musicBtn.innerHTML = '<i class="fas fa-music-slash"></i>';
    } else {
      audio.play().catch(e=>console.log("autoplay blocked, user gesture needed"));
      musicBtn.innerHTML = '<i class="fas fa-music"></i>';
    }
    musicPlaying = !musicPlaying;
  }

  // smooth scroll to gallery
  exploreBtn.addEventListener('click', () => {
    document.getElementById('gallerySection').scrollIntoView({ behavior: 'smooth' });
  });

  // Event listeners
  refreshBtn.addEventListener('click', () => refreshGallery());
  loadMoreBtn.addEventListener('click', () => loadMore());
  autoToggleBtn.addEventListener('click', () => toggleAutoRefresh());
  closeLightbox.addEventListener('click', closeLightboxFn);
  lightbox.addEventListener('click', (e) => { if(e.target === lightbox) closeLightboxFn(); });
  darkBtn.addEventListener('click', toggleDarkMode);
  musicBtn.addEventListener('click', toggleMusic);
  categoryBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const cat = btn.dataset.cat;
      setCategory(cat);
    });
  });

  // initial load
  loadGallery(false, false);
  loadFavorites();

  // cursor glow effect (premium)
  document.addEventListener('mousemove', (e) => {
    const glow = document.createElement('div');
    glow.style.position = 'fixed';
    glow.style.width = '30px';
    glow.style.height = '30px';
    glow.style.borderRadius = '50%';
    glow.style.background = 'radial-gradient(circle, rgba(255,106,196,0.6), transparent)';
    glow.style.pointerEvents = 'none';
    glow.style.zIndex = '9999';
    glow.style.left = e.clientX - 15 + 'px';
    glow.style.top = e.clientY - 15 + 'px';
    glow.style.transition = 'all 0.2s ease-out';
    document.body.appendChild(glow);
    setTimeout(() => glow.remove(), 300);
  });
  
  // Initial auto toggle visual state
  autoSwitch.classList.remove('active');
  autoRefreshActive = false;
</script>
</body>
</html>
